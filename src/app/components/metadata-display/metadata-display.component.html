<div class="metadata-container" *ngIf="currentFile">
  <ion-card>
    <ion-card-header>
      <ion-card-subtitle>Now Playing</ion-card-subtitle>
      <ion-card-title>{{ currentFile.title }}</ion-card-title>
    </ion-card-header>
    
    <ion-card-content>
      <ion-list lines="none">
        <ion-item>
          <ion-label>
            <ion-text color="medium">Artist</ion-text>
            <h2>{{ currentFile.artist || 'Unknown Artist' }}</h2>
          </ion-label>
        </ion-item>
        
        <ion-item *ngIf="currentFile.album">
          <ion-label>
            <ion-text color="medium">Album</ion-text>
            <h2>{{ currentFile.album }}</h2>
          </ion-label>
        </ion-item>
        
        <ion-item>
          <ion-label>
            <ion-text color="medium">Source</ion-text>
            <h2>Local File</h2>
          </ion-label>
        </ion-item>
      </ion-list>
    </ion-card-content>
  </ion-card>
</div>

<div class="no-file-container" *ngIf="!currentFile">
  <ion-text color="medium">
    <h2>No track selected</h2>
    <p>Select a track to view metadata</p>
  </ion-text>
</div>
